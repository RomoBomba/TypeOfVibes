<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Type Of Vibes</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            text-shadow: 1px 1px 3px black;
        }
        #interaction-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            text-shadow: 1px 1px 2px black;
        }
        #controls-hint {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
<div id="info">🏔️ Type Of Vibes | WASD - ходить, E - сесть на скамейку</div>
<div id="interaction-hint">Нажмите E, чтобы сесть на скамейку</div>
<div id="controls-hint">🖱️ Кликните для управления взглядом | ESC для выхода</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
